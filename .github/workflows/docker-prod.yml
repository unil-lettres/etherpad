name: docker-prod
on:
  schedule:
    - cron: '0 1 * * 1' # Every Monday at 1am
      timezone: "Europe/Zurich"
  push:
    branches:
      - "main"
    tags:
      - "*"
permissions: read-all
env:
  ETHERPAD_REPOSITORY: ether/etherpad-lite

jobs:
  evaluate-jobs:
    name: Determine jobs execution
    runs-on: ubuntu-latest
    outputs:
      run-merge-build: ${{ steps.determine.outputs.run-merge-build }}
      run-commit: ${{ steps.determine.outputs.run-commit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Determine jobs execution
        id: determine
        uses: unil-lettres/actions/job-execution@main
        with:
          image_repository: ${{ vars.DOCKERHUB_REPOSITORY }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  build:
    name: Build app (${{ matrix.arch }})
    if: needs.evaluate-jobs.outputs.run-merge-build == 'true'
    runs-on: ${{ matrix.os }}
    needs: [evaluate-jobs]
    strategy:
      matrix:
        include:
          - { arch: linux/amd64, os: ubuntu-latest }
          - { arch: linux/arm64, os: ubuntu-24.04-arm }

    steps:
      - name: Checkout and read version
        uses: actions/checkout@v5
        with:
          ref: main
          path: source

      - name: Set Etherpad version
        run: |
          FULL_VERSION=$(tr -d ' \t\r\n' < ./source/VERSION)
          ETHERPAD_TAG="${FULL_VERSION%%-rev*}"
          echo "ETHERPAD_TAG=$ETHERPAD_TAG" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: ${{ env.ETHERPAD_REPOSITORY }}
          ref: ${{ env.ETHERPAD_TAG }}
          path: etherpad-lite

      - name: Add poststart script to build context
        run: |
          cp ./source/config/k8s-poststart.sh ./etherpad-lite/k8s-poststart.sh
          echo '' >> ./etherpad-lite/Dockerfile
          echo 'COPY --chmod=755 --chown=etherpad:etherpad ./k8s-poststart.sh ${EP_DIR}/k8s-poststart.sh' >> ./etherpad-lite/Dockerfile

      - name: Build image
        uses: unil-lettres/actions/docker-build@main
        with:
          context: ./etherpad-lite
          dockerfile: ./etherpad-lite/Dockerfile
          target: production
          platform: ${{ matrix.arch }}
          build_args: |
            ETHERPAD_PLUGINS=ep_headings2
            INSTALL_SOFFICE=true
          image_repository: ${{ vars.DOCKERHUB_REPOSITORY }}
          name_prefix: app
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  merge:
    name: Merge
    if: needs.evaluate-jobs.outputs.run-merge-build == 'true'
    runs-on: ubuntu-latest
    needs: [evaluate-jobs, build]
    outputs:
      tag: ${{ steps.merge.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Read VERSION file
        id: version
        run: echo "tag=v$(cat VERSION | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Merge service
        id: merge
        uses: unil-lettres/actions/docker-merge-prod@main
        with:
          tag: ${{ steps.version.outputs.tag }}
          image_repository: ${{ vars.DOCKERHUB_REPOSITORY }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

  commit:
    name: Commit Image Tag
    if: needs.evaluate-jobs.outputs.run-commit == 'true'
    runs-on: ubuntu-latest
    needs: [evaluate-jobs, merge]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Find apache-shibboleth latest DockerHub tag
        id: find_shib_tag
        continue-on-error: true
        uses: unil-lettres/actions/latest-tag@main
        with:
          image_repository: ${{ vars.DOCKERHUB_SHIB_REPOSITORY }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare commit values
        run: |
          if [[ "${{ steps.find_shib_tag.outcome }}" == "success" ]]; then
            echo "VERSIONS=${{ needs.merge.outputs.tag }},${{ steps.find_shib_tag.outputs.tag }}" >> $GITHUB_ENV
            echo "VERSION_KEYS=app_image_tag,shib_image_tag" >> $GITHUB_ENV
          else
            echo "VERSIONS=${{ needs.merge.outputs.tag }}" >> $GITHUB_ENV
            echo "VERSION_KEYS=app_image_tag" >> $GITHUB_ENV
          fi

      - name: Update image
        uses: unil-lettres/actions/commit-version@main
        with:
          file_path: palett/values-prod.yaml
          versions: ${{ env.VERSIONS }}
          version_keys: ${{ env.VERSION_KEYS }}
          token: ${{ secrets.PAT_TOKEN }}
          repository: unil-lettres/k8s
          branch: main

  update-description:
    name: Update Description
    runs-on: ubuntu-latest
    needs: [merge]
    if: success()
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Update description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_REPOSITORY }}
